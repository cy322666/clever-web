global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ 'prometheus:9090' ]

  - job_name: app_metrics
    metrics_path: /metrics
    params:
      token: [ '__METRICS_TOKEN__' ]
    static_configs:
      - targets: [ 'app:8000' ]

  - job_name: postgres_exporter
    static_configs:
      - targets: [ 'postgres-exporter:9187' ]

  - job_name: loki
    static_configs:
      - targets: [ 'loki:3100' ]

  - job_name: promtail
    static_configs:
      - targets: [ 'promtail:9080' ]

  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [ http_2xx ]
    static_configs:
      - targets:
          - http://app:8000/up
    relabel_configs:
      - source_labels: [ __address__ ]
        target_label: __param_target
      - source_labels: [ __param_target ]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
