groups:
  - name: clever-web
    rules:
      - alert: AppUnavailable
        expr: probe_success{job="blackbox_http"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "App endpoint is unavailable"
          description: "Blackbox probe to /up failed for more than 1 minute."

      - alert: AppMetricsScrapeFailed
        expr: up{job="app_metrics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App metrics are not scrapeable"
          description: "Prometheus cannot scrape /metrics for more than 2 minutes."

      - alert: SchedulerHeartbeatStale
        expr: clever_scheduler_heartbeat_age_seconds > 180
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Scheduler heartbeat is stale"
          description: "No scheduler heartbeat for over 3 minutes."

      - alert: FailedJobsDetected
        expr: clever_queue_failed_jobs_total > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Failed jobs detected"
          description: "There are failed jobs in failed_jobs table for at least 5 minutes."

      - alert: QueueBacklogHigh
        expr: clever_queue_jobs_total > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Queue backlog is high"
          description: "Queued jobs exceed 200 for more than 10 minutes."

      - alert: QueueOldestJobTooOld
        expr: clever_queue_oldest_job_age_seconds > 900
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Oldest queue job is too old"
          description: "Oldest waiting job age is over 15 minutes."

      - alert: MetricsCollectionError
        expr: clever_metrics_up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Application metrics collection has errors"
          description: "The app metrics endpoint reports collection errors."

      - alert: PostgresExporterDown
        expr: up{job="postgres_exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Postgres exporter is down"
          description: "Prometheus cannot scrape postgres-exporter for over 2 minutes."

      - alert: DbSlowQueriesBurst
        expr: increase(clever_db_slow_queries_total[10m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Burst of slow DB queries"
          description: "More than 10 slow DB queries were detected in the last 10 minutes."
