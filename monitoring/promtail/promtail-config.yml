server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: laravel-logs
    pipeline_stages:
      - multiline:
          firstline: '^\[[0-9]{4}-[0-9]{2}-[0-9]{2}'
      - regex:
          expression: '(?s)^\[(?P<ts>[^\]]+)\]\s+(?P<env>[A-Za-z0-9_-]+)\.(?P<level>[A-Z]+):\s+(?P<message>.*)$'
      - template:
          source: level
          template: '{{ ToLower .Value }}'
      - labels:
          level:
          env:
    static_configs:
      - targets:
          - localhost
        labels:
          job: laravel
          app: clever-web
          __path__: /var/www/html/storage/logs/**/*.log
