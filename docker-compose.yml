version: '3.5'

services:
  app:
    build: ./docker/images/php82
    environment:
      QUEUE_CONNECTION: redis
      WORKFLOWS_QUEUE_CONNECTION: redis
      WORKFLOW_WEBHOOKS_QUEUE_CONNECTION: redis
    command: >
      sh -lc "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
      && (chown -R www-data:www-data storage bootstrap/cache || true)
      && php artisan package:discover --ansi
      && php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - ./application:/var/www/html
      - ./docker/images/cron/files:/var/spool/cron/crontabs/
    ports:
      - "8080:8000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      supervisor:
        condition: service_started
    working_dir: /var/www/html
    networks:
      default:
        aliases:
          - app

  postgresql:
    image: postgres:14.1-alpine
    ports:
      - "5425:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: pQLkm8NOkS0gOBox
      POSTGRES_DB: clever
    volumes:
      - ./docker/images/postgres/files/postgresql.conf:/etc/postgresql.conf
    command: ["postgres", "-c", "config_file=/etc/postgresql.conf"]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d clever"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      default:
        aliases:
          - postgresql

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      default:
        aliases:
          - redis

  supervisor:
    build: ./docker/images/supervisor
    environment:
      QUEUE_CONNECTION: redis
      WORKFLOWS_QUEUE_CONNECTION: redis
      WORKFLOW_WEBHOOKS_QUEUE_CONNECTION: redis
    command: >
      sh -lc "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
      && (chown -R www-data:www-data storage bootstrap/cache || true)
      && php artisan package:discover --ansi
      && /usr/bin/supervisord -n"
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - ./application:/var/www/html
      - ./docker/images/supervisor/files:/etc/supervisor/conf.d/
    ports:
      - "8007:8008"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default:
        aliases:
          - supervisor

volumes:
  redis-data:
