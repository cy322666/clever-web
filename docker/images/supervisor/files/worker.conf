; =========================
; Laravel queues через Horizon
; =========================
; Horizon сам управляет воркерами, балансирует очереди и перезапускает процессы.
; Конфигурация очередей лежит в application/config/horizon.php.

[program:horizon]
priority=100
process_name=%(program_name)s
command=/bin/sh -lc 'php /var/www/html/artisan horizon:sync-platform-monitoring || true; exec php /var/www/html/artisan horizon'
autostart=true
autorestart=true
user=www-data
startsecs=5
stopwaitsecs=3600
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/horizon.log
stdout_logfile_maxbytes=64MB
stdout_logfile_backups=10


; =========================
; Legacy database queue drain
; =========================
; Нужен на переходный период Redis/Horizon: старые jobs могли остаться в таблице jobs.
; Horizon их не увидит, потому что Horizon работает только с Redis.

[program:legacy-database-yclients]
priority=180
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work database --queue=yclients_record --sleep=1 --tries=2 --timeout=300 --max-time=3600 --max-jobs=800 --memory=512
autostart=true
autorestart=true
user=www-data
startsecs=5
stopwaitsecs=900
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/queue-legacy-yclients.log
stdout_logfile_maxbytes=64MB
stdout_logfile_backups=10
numprocs=3


[program:legacy-database-drain]
priority=190
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work database --queue=workflows,workflow-webhooks,getcourse_form,getcourse_order,bizon_form,bizon_export,tilda_form,alfacrm_hook,alfacrm_record,distribution_transaction,import_excel,call_transcription,default --sleep=2 --tries=3 --timeout=900 --max-time=3600 --max-jobs=800 --memory=512
autostart=true
autorestart=true
user=www-data
startsecs=5
stopwaitsecs=900
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/queue-legacy-drain.log
stdout_logfile_maxbytes=64MB
stdout_logfile_backups=10
numprocs=1
