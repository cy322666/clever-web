; =========================
; Laravel queues через Horizon
; =========================
; Horizon сам управляет воркерами, балансирует очереди и перезапускает процессы.
; Конфигурация очередей лежит в application/config/horizon.php.

[program:horizon]
priority=100
process_name=%(program_name)s
command=/bin/sh -lc 'php /var/www/html/artisan horizon:sync-platform-monitoring || true; exec php /var/www/html/artisan horizon'
autostart=true
autorestart=true
user=www-data
startsecs=5
stopwaitsecs=3600
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/horizon.log
stdout_logfile_maxbytes=64MB
stdout_logfile_backups=10
