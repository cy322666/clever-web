[program:scheduler]
priority = 100
process_name=%(program_name)s_%(process_num)02d
command=sh -lc "mkdir -p /var/www/html/storage/framework/cache/data /var/www/html/storage/framework/sessions /var/www/html/storage/framework/views /var/www/html/storage/logs /var/www/html/bootstrap/cache && php /var/www/html/artisan schedule:work"
autostart=true
autorestart=true
user=www-data
startsecs=0
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/var/www/html/storage/logs/scheduler.log
numprocs=1
